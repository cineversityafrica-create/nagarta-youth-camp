<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAGARTA Youth Camp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 420px;
      height: 480px;
      background: #301317;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      -webkit-app-region: drag;
      user-select: none;
    }

    /* Subtle radial glow */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(83,28,34,0.7) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Gold top line */
    body::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, transparent, #cba36b, transparent);
    }

    .logo {
      width: 180px;
      height: 180px;
      object-fit: contain;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.6s ease-out;
    }

    .title {
      color: #cba36b;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 6px;
      opacity: 0.8;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.8s ease-out;
    }

    .subtitle {
      color: #f3eee9;
      font-size: 22px;
      font-weight: 600;
      font-style: italic;
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
      animation: fadeIn 1s ease-out;
    }

    /* Animated dots loader */
    .loader {
      display: flex;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #cba36b;
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <img src="./build/icon.png" alt="NAGARTA" class="logo" />
  <p class="title">2026</p>
  <p class="subtitle">Arise &amp; Lead</p>
  <div class="loader">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</body>
</html>
