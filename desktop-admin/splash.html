<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NAGARTA Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px; height: 480px;
      background: #1a0a0e;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      -webkit-app-region: drag;
      user-select: none;
    }
    body::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(40,10,15,0.9) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(to right, transparent, #cba36b, transparent);
    }
    .logo { width: 160px; height: 160px; object-fit: contain; margin-bottom: 24px; position: relative; z-index: 1; animation: fadeIn 0.6s ease-out; }
    .badge {
      background: #cba36b; color: #301317;
      font-size: 8px; font-family: Arial, sans-serif;
      font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase;
      padding: 4px 12px; border-radius: 20px;
      margin-bottom: 10px;
      position: relative; z-index: 1;
      animation: fadeIn 0.7s ease-out;
    }
    .title { color: #f3eee9; font-size: 20px; font-weight: 600; font-style: italic; margin-bottom: 36px; position: relative; z-index: 1; animation: fadeIn 0.9s ease-out; }
    .loader { display: flex; gap: 8px; position: relative; z-index: 1; }
    .dot { width: 8px; height: 8px; background: #cba36b; border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4;} 40%{transform:scale(1);opacity:1;} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
  </style>
</head>
<body>
  <img src="./build/icon.png" alt="NAGARTA" class="logo" />
  <div class="badge">Admin Portal</div>
  <p class="title">NAGARTA Youth Camp</p>
  <div class="loader">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</body>
</html>
